<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- Ground -->
  <line x1="40" y1="250" x2="760" y2="250" stroke="#1C355E" stroke-width="5"/>

  <!-- Wheel at start -->
  <g transform="translate(160,165)">
    <circle cx="0" cy="0" r="85" fill="#1C355E"/>
    <circle cx="0" cy="0" r="60" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="12" fill="#1C355E"/>
    <!-- diameter -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#FF7A5C" stroke-width="5"/>
    <circle cx="-60" cy="0" r="5" fill="#FF7A5C"/>
    <circle cx="60" cy="0" r="5" fill="#FF7A5C"/>
    <text x="0" y="-22" text-anchor="middle" font-size="22" fill="#FF7A5C" font-weight="bold">d = 8.8 cm</text>
    <!-- valve mark -->
    <circle cx="0" cy="79" r="7" fill="#00C9A7"/>
    <!-- rotation arrow -->
    <path d="M 60 -95 A 110 110 0 0 1 112 -18" fill="none" stroke="#625D9C" stroke-width="6" stroke-linecap="round"/>
    <polygon points="118,-38 116,-6 92,-24" fill="#625D9C"/>
  </g>
  <text x="160" y="45" text-anchor="middle" font-size="23" fill="#625D9C" font-weight="bold">1 full turn = 360&#176;</text>

  <!-- Ghost wheel at end -->
  <g transform="translate(640,165)" opacity="0.35">
    <circle cx="0" cy="0" r="85" fill="#1C355E"/>
    <circle cx="0" cy="0" r="60" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="12" fill="#1C355E"/>
    <circle cx="0" cy="79" r="7" fill="#00C9A7"/>
  </g>

  <!-- Rolled distance -->
  <line x1="160" y1="290" x2="640" y2="290" stroke="#00C9A7" stroke-width="6"/>
  <line x1="160" y1="277" x2="160" y2="303" stroke="#00C9A7" stroke-width="6"/>
  <line x1="640" y1="277" x2="640" y2="303" stroke="#00C9A7" stroke-width="6"/>
  <text x="400" y="330" text-anchor="middle" font-size="26" fill="#1C355E" font-weight="bold">one turn rolls: &#960; &#215; 8.8 cm &#8776; 27.6 cm</text>
</svg>
