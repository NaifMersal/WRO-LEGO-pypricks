<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- Planned square (dashed teal) -->
  <g transform="translate(120,80)">
    <rect x="0" y="0" width="240" height="240" fill="none" stroke="#00C9A7" stroke-width="6" stroke-dasharray="16 10"/>
    <circle cx="0" cy="240" r="10" fill="#00C9A7"/>
    <text x="120" y="-25" text-anchor="middle" font-size="24" fill="#00C9A7" font-weight="bold">the plan</text>
    <text x="120" y="5" text-anchor="middle" font-size="19" fill="#00C9A7">ends where it started</text>
  </g>

  <!-- Actual drifting path (coral): each side a bit long, each turn a bit short -->
  <g transform="translate(430,80)">
    <path d="M 0 240
             L 252 228
             L 274 -6
             L 22 -34
             L -20 216"
          fill="none" stroke="#FF7A5C" stroke-width="6" stroke-linejoin="round"/>
    <!-- start dot -->
    <circle cx="0" cy="240" r="10" fill="#1C355E"/>
    <!-- end dot -->
    <circle cx="-20" cy="216" r="10" fill="#FF7A5C"/>
    <text x="130" y="-55" text-anchor="middle" font-size="24" fill="#FF7A5C" font-weight="bold">the robot</text>

    <!-- gap arrow -->
    <line x1="-58" y1="290" x2="-30" y2="234" stroke="#625D9C" stroke-width="4"/>
    <text x="-40" y="318" text-anchor="middle" font-size="20" fill="#625D9C" font-weight="bold">the drift!</text>
  </g>

  <text x="400" y="400" text-anchor="middle" font-size="22" fill="#1C355E" font-weight="bold">Timed sides + guessed turns: every tiny error rides on the last one &#8212; the square never closes.</text>
</svg>
