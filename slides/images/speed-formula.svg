<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- Start / finish lines -->
  <line x1="120" y1="60" x2="120" y2="230" stroke="#1C355E" stroke-width="4" stroke-dasharray="10 6"/>
  <line x1="620" y1="60" x2="620" y2="230" stroke="#1C355E" stroke-width="4" stroke-dasharray="10 6"/>
  <text x="120" y="45" text-anchor="middle" font-size="20" fill="#1C355E" font-weight="bold">START</text>
  <text x="620" y="45" text-anchor="middle" font-size="20" fill="#1C355E" font-weight="bold">FINISH</text>

  <!-- Robot (top view) -->
  <g transform="translate(200,110)">
    <rect x="0" y="0" width="110" height="80" rx="12" fill="#1C355E"/>
    <rect x="-12" y="8" width="14" height="26" rx="5" fill="#333"/>
    <rect x="-12" y="46" width="14" height="26" rx="5" fill="#333"/>
    <rect x="108" y="8" width="14" height="26" rx="5" fill="#333"/>
    <rect x="108" y="46" width="14" height="26" rx="5" fill="#333"/>
    <rect x="30" y="20" width="50" height="40" rx="6" fill="#FFD500"/>
    <circle cx="55" cy="40" r="8" fill="#1C355E"/>
  </g>

  <!-- Motion arrow -->
  <line x1="345" y1="150" x2="580" y2="150" stroke="#00C9A7" stroke-width="8" stroke-linecap="round"/>
  <polygon points="580,135 610,150 580,165" fill="#00C9A7"/>

  <!-- Distance ruler -->
  <line x1="120" y1="260" x2="620" y2="260" stroke="#FF7A5C" stroke-width="5"/>
  <line x1="120" y1="248" x2="120" y2="272" stroke="#FF7A5C" stroke-width="5"/>
  <line x1="620" y1="248" x2="620" y2="272" stroke="#FF7A5C" stroke-width="5"/>
  <text x="370" y="295" text-anchor="middle" font-size="26" fill="#FF7A5C" font-weight="bold">distance = 50 cm</text>

  <!-- Stopwatch -->
  <g transform="translate(700,110)">
    <circle cx="0" cy="40" r="42" fill="none" stroke="#625D9C" stroke-width="6"/>
    <rect x="-10" y="-14" width="20" height="12" rx="3" fill="#625D9C"/>
    <line x1="0" y1="40" x2="0" y2="12" stroke="#625D9C" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="20" y2="52" stroke="#625D9C" stroke-width="5" stroke-linecap="round"/>
    <text x="0" y="115" text-anchor="middle" font-size="24" fill="#625D9C" font-weight="bold">time = 2.0 s</text>
  </g>

  <!-- Formula -->
  <rect x="110" y="315" width="580" height="52" rx="12" fill="#EAF7F4" stroke="#00C9A7" stroke-width="3"/>
  <text x="400" y="349" text-anchor="middle" font-size="27" fill="#1C355E" font-weight="bold">speed = distance &#247; time = 50 cm &#247; 2.0 s = 25 cm/s</text>
</svg>
